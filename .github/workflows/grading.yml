name: Autograding
on:
  push:
    paths:
      - 'Q1.c'
      - 'Q2.cpp'
jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Student Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Fetch Secure Answers
        # This line uses your hidden secret to securely download the private answers
        run: |
          git clone https://${{ secrets.SECRET_GRADER_TOKEN }}@github.com/Kallgit22/secure-grader.git secret_files

      - name: Run Autograder
        run: python3 secret_files/grade.py

      - name: Clean Up Vault
        # This ensures the answers are wiped from the server after grading
        if: always()
        run: rm -rf secret_files
