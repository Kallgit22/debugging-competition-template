name: Autograding
on:
  push:
    paths:
      - 'Q1.c'
      - 'Q2.cpp'
jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Autograder
        run: python3 .hidden/grade.py
